<html>

<head>
    <title>Sneakers</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: white;
            width: 300px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        h2 {
            color: #333;
            margin: 10px 0;
        }

        p {
            color: #555;
            font-size: 15px;
        }

        .section {
            margin: 10px 0;
        }

        input[type="radio"] {
            margin: 5px;
            cursor: pointer;
        }

        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #e60000;
        }
    </style>

</head>

<body>

<div class="card">

    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

    <h2>Stylish Sneakers</h2>

    <p><strong>Price:</strong> ₹2999</p>

    <div class="section">
        <p><strong>Color:</strong></p>
        <input type="radio"> Red
        <input type="radio"> Blue
    </div>

    <div class="section">
        <p><strong>Size:</strong></p>
        <input type="radio"> 7
        <input type="radio"> 8
    </div>

    <button>Add to Cart</button>

    <p><strong>Review:</strong> Good product</p>

</div>

</body>

</html>
